  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

    <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- Quick actions chips -->\n        <sc-if value=\"{{ showQuickActions }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;padding:8px 0;justify-content:flex-end\" dir=\"rtl\">\n            <button onclick=\"{{ handleBalance }}\" style=\"background:white;border:1px solid rgba(0,0,0,0.12);border-radius:20px;padding:7px 13px;font-family:'Cairo',sans-serif;font-size:12px;color:#15233a;cursor:pointer\" style-hover=\"background:#f5ede8\">💰 رصيدي<\u002Fbutton>\n            <button onclick=\"{{ handleTransfer }}\" style=\"background:white;border:1px solid rgba(0,0,0,0.12);border-radius:20px;padding:7px 13px;font-family:'Cairo',sans-serif;font-size:12px;color:#15233a;cursor:pointer\" style-hover=\"background:#f5ede8\">↗ تحويل سريع<\u002Fbutton>\n            <button onclick=\"{{ handleBill }}\" style=\"background:white;border:1px solid rgba(0,0,0,0.12);border-radius:20px;padding:7px 13px;font-family:'Cairo',sans-serif;font-size:12px;color:#15233a;cursor:pointer\" style-hover=\"background:#f5ede8\">📋 سداد فاتورة<\u002Fbutton>\n            <button onclick=\"{{ handleCard }}\" style=\"background:white;border:1px solid rgba(0,0,0,0.12);border-radius:20px;padding:7px 13px;font-family:'Cairo',sans-serif;font-size:12px;color:#15233a;cursor:pointer\" style-hover=\"background:#f5ede8\">🔒 تجميد بطاقة<\u002Fbutton>\n            <button onclick=\"{{ handleSavings }}\" style=\"background:white;border:1px solid rgba(0,0,0,0.12);border-radius:20px;padding:7px 13px;font-family:'Cairo',sans-serif;font-size:12px;color:#15233a;cursor:pointer\" style-hover=\"background:#f5ede8\">✨ فرصة ادخار<\u002Fbutton>\n            <button onclick=\"{{ handleTransactions }}\" style=\"background:white;border:1px solid rgba(0,0,0,0.12);border-radius:20px;padding:7px 13px;font-family:'Cairo',sans-serif;font-size:12px;color:#15233a;cursor:pointer\" style-hover=\"background:#f5ede8\">📊 آخر المعاملات<\u002Fbutton>\n            <button onclick=\"{{ handleDigitalProducts }}\" style=\"background:#15233a;border:1px solid #15233a;border-radius:20px;padding:7px 13px;font-family:'Cairo',sans-serif;font-size:12px;color:white;cursor:pointer\" style-hover=\"background:#1d3460\">🏦 منتجات رقمية<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <!-- Input -->\n      <div style=\"padding:12px 14px;border-top:1px solid rgba(0,0,0,0.07);background:white;display:flex;align-items:center;gap:8px;flex-shrink:0\" dir=\"rtl\">\n        <input value=\"{{ inputText }}\" oninput=\"{{ handleInput }}\" onkeydown=\"{{ handleKeyDown }}\" placeholder=\"اكتب رسالتك لبشرى...\" style=\"flex:1;border:1px solid rgba(0,0,0,0.1);border-radius:20px;padding:9px 14px;font-family:'Cairo',sans-serif;font-size:13px;color:#15233a;outline:none;direction:rtl;background:#f9f7f5\" style-focus=\"border-color:#15233a;background:white\">\n        <button onclick=\"{{ sendMessage }}\" style=\"width:36px;height:36px;background:#15233a;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0\" style-hover=\"background:#1d3460\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"white\"><line x1=\"22\" y1=\"2\" x2=\"11\" y2=\"13\"><\u002Fline><polygon points=\"22,2 15,22 11,13 2,9\"><\u002Fpolygon><\u002Fsvg>\n        <\u002Fbutton>\n        <button style=\"width:36px;height:36px;background:#f5ede8;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0\" style-hover=\"background:#ece0d6\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#15233a\" stroke-width=\"2\"><path d=\"M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z\"><\u002Fpath><path d=\"M19 10v2a7 7 0 0 1-14 0v-2\"><\u002Fpath><line x1=\"12\" y1=\"19\" x2=\"12\" y2=\"23\"><\u002Fline><line x1=\"8\" y1=\"23\" x2=\"16\" y2=\"23\"><\u002Fline><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    chatOpen: false,\n    messages: [],\n    inputText: '',\n    isTyping: false,\n    activeFlow: null,\n    proactiveVisible: false,\n    otpTimer: 59,\n  };\n\n  _otpInterval = null;\n\n  componentDidMount() {\n    setTimeout(() => this.setState({ proactiveVisible: true }), 5000);\n  }\n\n  componentDidUpdate(pp, ps) {\n    const s = this.state;\n    if (ps.messages.length !== s.messages.length || ps.isTyping !== s.isTyping || ps.activeFlow !== s.activeFlow) {\n      const el = document.getElementById('bushra-msgs');\n      if (el) el.scrollTop = el.scrollHeight;\n    }\n    // wire OTP input auto-advance\n    if (s.activeFlow === 'otp-entry' && ps.activeFlow !== 'otp-entry') {\n      setTimeout(() => this._wireOTP(), 100);\n    }\n  }\n\n  componentWillUnmount() {\n    if (this._otpInterval) clearInterval(this._otpInterval);\n  }\n\n  _wireOTP() {\n    const ids = ['otp1','otp2','otp3','otp4','otp5','otp6'];\n    ids.forEach((id, i) => {\n      const el = document.getElementById(id);\n      if (!el) return;\n      el.addEventListener('input', (e) => {\n        if (e.target.value && i < 5) {\n          const next = document.getElementById(ids[i + 1]);\n          if (next) next.focus();\n        }\n      });\n      el.addEventListener('keydown', (e) => {\n        if (e.key === 'Backspace' && !e.target.value && i > 0) {\n          const prev = document.getElementById(ids[i - 1]);\n          if (prev) { prev.value = ''; prev.focus(); }\n        }\n      });\n    });\n    // focus first\n    const first = document.getElementById('otp1');\n    if (first) first.focus();\n    // start timer\n    if (this._otpInterval) clearInterval(this._otpInterval);\n    this.setState({ otpTimer: 59 });\n    this._otpInterval = setInterval(() => {\n      this.setState(s => {\n        if (s.otpTimer <= 1) { clearInterval(this._otpInterval); return { otpTimer: 0 }; }\n        return { otpTimer: s.otpTimer - 1 };\n      });\n    }, 1000);\n  }\n\n  get _now() {\n    return new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });\n  }\n\n  _msg(role, text) {\n    return {\n      role, text, time: this._now,\n      justify: role === 'user' ? 'flex-start' : 'flex-end',\n      bubbleBg: role === 'user' ? '#15233a' : '#eee8e0',\n      textColor: role === 'user' ? '#ffffff' : '#15233a',\n      bubbleRadius: role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',\n    };\n  }\n\n  _userSay(text) {\n    this.setState(s => ({\n      messages: [...s.messages, this._msg('user', text)],\n      isTyping: true,\n      activeFlow: null,\n    }));\n  }\n\n  _botReply(text, flow, delay = 1300) {\n    setTimeout(() => {\n      this.setState(s => ({\n        messages: [...s.messages, this._msg('assistant', text)],\n        isTyping: false,\n        activeFlow: flow || null,\n      }));\n    }, delay);\n  }\n\n  openChat() {\n    const fresh = this.state.messages.length === 0;\n    this.setState({ chatOpen: true, proactiveVisible: false });\n    if (fresh) {\n      setTimeout(() => {\n        this.setState(s => ({\n          messages: [this._msg('assistant', 'مرحباً عبدالله! 👋\\nأنا بشرى، مساعدتك الذكية في بنك الإنماء.\\nيمكنني مساعدتك في التحويلات، الفواتير، البطاقات، والمنتجات المصرفية.\\nبماذا أستطيع مساعدتك اليوم؟')],\n        }));\n      }, 320);\n    }\n  }\n\n  closeChat() { this.setState({ chatOpen: false }); }\n  toggleChat() { this.state.chatOpen ? this.closeChat() : this.openChat(); }\n  dismissProactive() { this.setState({ proactiveVisible: false }); }\n  resetChat() { this.setState({ messages: [], activeFlow: null, isTyping: false, inputText: '' }); this.openChat(); }\n\n  openSavingsProactive() {\n    this.openChat();\n    setTimeout(() => { if (!this.state.isTyping) this.handleSavings(); }, 1000);\n  }\n\n  handleBalance() {\n    if (this.state.isTyping) return;\n    this._userSay('ما رصيدي؟');\n    this._botReply('بالطبع! هذه أرصدة جميع حساباتك:', 'balance');\n  }\n\n  handleTransfer() {\n    if (this.state.isTyping) return;\n    this._userSay('حول 300 ريال لمحمد سامي');\n    this._botReply('وجدت محمد سامي في قائمة المستفيدين.\\nيرجى مراجعة تفاصيل التحويل أدناه ثم إرسال رمز OTP للتأكيد:', 'transfer-confirm');\n  }\n\n  handleBill() {\n    if (this.state.isTyping) return;\n    this._userSay('سددي فاتورة الكهرباء');\n    this._botReply('وجدت فاتورة شركة الكهرباء السعودية المستحقة. مراجعة التفاصيل:', 'bill-confirm');\n  }\n\n  handleCard() {\n    if (this.state.isTyping) return;\n    this._userSay('اجمّدي بطاقتي VISA');\n    this._botReply('سأجمّد بطاقتك VISA *** 4521 فوراً.\\nيمكنك رفع التجميد في أي وقت من هنا أو من التطبيق.', 'card-freeze');\n  }\n\n  handleSavings() {\n    if (this.state.isTyping) return;\n    this._userSay('أخبريني عن فرص الادخار');\n    this._botReply('لاحظت أنك تحتفظ بحوالي 1,200 ريال شهرياً دون استثمار 📊\\n\\nبرنامج الادخار من الإنماء يمنحك عائداً سنوياً مضموناً بنسبة 2%.\\nهل تريد تحويلها الآن؟', 'savings');\n  }\n\n  handleTransactions() {\n    if (this.state.isTyping) return;\n    this._userSay('أرني آخر معاملاتي');\n    this._botReply('بالطبع! هذه آخر 5 معاملات على حسابك الرئيسي:', 'transactions');\n  }\n\n  handleDigitalProducts() {\n    if (this.state.isTyping) return;\n    this._userSay('ما هي المنتجات الرقمية المتاحة؟');\n    this._botReply('لديك 3 منتجات رقمية قد تناسب احتياجاتك الحالية 🏦\\nاستعرضها وتقدّم بطلبك مباشرة:', 'digital-products');\n  }\n\n  requestOTP() {\n    this.setState({ isTyping: true, activeFlow: null });\n    setTimeout(() => {\n      this.setState(s => ({\n        messages: [...s.messages, this._msg('assistant', 'تم إرسال رمز التحقق OTP إلى جوالك المسجّل.\\nأدخل الرمز المكون من 6 أرقام للمتابعة:')],\n        isTyping: false,\n        activeFlow: 'otp-entry',\n      }));\n    }, 1200);\n  }\n\n  verifyOTP() {\n    const ids = ['otp1','otp2','otp3','otp4','otp5','otp6'];\n    const otp = ids.map(id => { const el = document.getElementById(id); return el ? el.value : ''; }).join('');\n    if (otp.length < 6) {\n      // shake all inputs\n      ids.forEach(id => {\n        const el = document.getElementById(id);\n        if (el) { el.style.animation = 'otpShake 0.4s ease'; el.style.borderColor = '#e84545'; setTimeout(() => { el.style.animation = ''; el.style.borderColor = ''; }, 500); }\n      });\n      return;\n    }\n    if (this._otpInterval) clearInterval(this._otpInterval);\n    this.setState({ isTyping: true, activeFlow: null });\n    setTimeout(() => {\n      this.setState(s => ({\n        messages: [...s.messages, this._msg('assistant', 'تم التحويل بنجاح! ✅\\n━━━━━━━━━━━━━━━\\nالمبلغ: 300.00 ريال\\nإلى: محمد سامي\\nالتاريخ: ' + new Date().toLocaleDateString('ar-SA') + '\\nرقم المرجع: INM-2026-447821\\n\\nهل تريد المزيد من المساعدة؟')],\n        isTyping: false,\n        activeFlow: null,\n      }));\n    }, 1400);\n  }\n\n  _confirm(type) {\n    this.setState({ isTyping: true, activeFlow: null });\n    const replies = {\n      bill: 'تم سداد الفاتورة بنجاح! ✅\\n━━━━━━━━━━━━━━━\\nشركة الكهرباء السعودية\\nالمبلغ: 186.00 ريال\\nرقم المرجع: SADAD-2026-889034',\n      card: 'تم تجميد البطاقة! 🔒\\n━━━━━━━━━━━━━━━\\nVISA *** 4521\\nيمكنك رفع التجميد في أي وقت.',\n      savings: 'تم التحويل لحساب التوفير! ✅\\n━━━━━━━━━━━━━━━\\n1,200 ريال → برنامج الادخار الإنماء\\nالعائد السنوي: 24.00 ريال 🎉\\nيمكنك متابعة نمو مدخراتك من قسم الحسابات.',\n    };\n    this._botReply(replies[type], null, 1200);\n  }\n\n  applyTravelCard() {\n    this.setState({ activeFlow: null });\n    this._userSay('أريد شحن بطاقة السفر');\n    this._botReply('ممتاز! بطاقة السفر الإنماء جاهزة ✈\\n━━━━━━━━━━━━━━━\\nالرصيد الحالي: $240.00\\n\\nكم تريد شحن بطاقة السفر؟ (بالريال السعودي)\\nسعر الصرف الحالي: 1 USD = 3.75 SAR', null);\n  }\n\n  applyFinancing() {\n    this.setState({ activeFlow: null });\n    this._userSay('أريد التقديم على تمويل شخصي');\n    this._botReply('بناءً على ملفك الائتماني، مؤهّل للتمويل الشخصي 💼\\n━━━━━━━━━━━━━━━\\nالحد الأقصى: 500,000 ريال\\nمدة التمويل: حتى 60 شهراً\\nنسبة الربح: تنافسية ومتوافقة مع الشريعة\\n\\nهل تريد إكمال الطلب؟ سيستغرق 3 دقائق فقط.', null);\n  }\n\n  applySubAccount() {\n    this.setState({ activeFlow: null });\n    this._userSay('أريد فتح حساب فرعي');\n    this._botReply('رائع! فتح حساب فرعي جديد 🏦\\n━━━━━━━━━━━━━━━\\nما هو هدف الحساب الجديد؟\\n\\n• 🌴 صندوق الإجازات\\n• 📚 صندوق التعليم\\n• 🚨 صندوق الطوارئ\\n• 🏠 صندوق مخصص\\n\\nاذكر الهدف وسأنشئ الحساب فوراً!', null);\n  }\n\n  cancelAction() {\n    if (this._otpInterval) clearInterval(this._otpInterval);\n    this.setState(s => ({\n      messages: [...s.messages, this._msg('assistant', 'تم الإلغاء. هل هناك شيء آخر يمكنني مساعدتك به؟')],\n      activeFlow: null,\n    }));\n  }\n\n  handleInput(e) { this.setState({ inputText: e.target.value }); }\n\n  handleKeyDown(e) {\n    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendMessage(); }\n  }\n\n  sendMessage() {\n    const text = this.state.inputText.trim();\n    if (!text || this.state.isTyping) return;\n    const lower = text.toLowerCase();\n    this.setState({ inputText: '' });\n    // Smart routing\n    if (lower.includes('رصيد') || lower.includes('حساب')) { this._userSay(text); this._botReply('بالطبع! هذه أرصدة حساباتك:', 'balance'); return; }\n    if (lower.includes('تحويل') || lower.includes('حول')) { this._userSay(text); this._botReply('وجدت محمد سامي في قائمة المستفيدين.\\nيرجى مراجعة تفاصيل التحويل:', 'transfer-confirm'); return; }\n    if (lower.includes('فاتورة') || lower.includes('كهرباء') || lower.includes('سداد')) { this._userSay(text); this._botReply('وجدت فاتورة شركة الكهرباء السعودية:', 'bill-confirm'); return; }\n    if (lower.includes('بطاقة') || lower.includes('تجميد')) { this._userSay(text); this._botReply('سأجمّد بطاقتك VISA *** 4521:', 'card-freeze'); return; }\n    if (lower.includes('ادخار') || lower.includes('توفير') || lower.includes('استثمار')) { this._userSay(text); this._botReply('لاحظت فرصة ادخار مناسبة لك 📊', 'savings'); return; }\n    if (lower.includes('معاملات') || lower.includes('عمليات')) { this._userSay(text); this._botReply('هذه آخر معاملاتك:', 'transactions'); return; }\n    if (lower.includes('منتج') || lower.includes('سفر') || lower.includes('تمويل')) { this._userSay(text); this._botReply('هذه المنتجات الرقمية المتاحة لك:', 'digital-products'); return; }\n    this._userSay(text);\n    this._botReply('شكراً على سؤالك! يمكنني مساعدتك في:\\n• التحويلات السريعة\\n• سداد الفواتير\\n• الاطلاع على الرصيد\\n• إدارة البطاقات\\n• المنتجات الرقمية\\n\\nاستخدم الاختصارات السريعة أدناه أو أخبرني بما تحتاج.', null);\n  }\n\n  renderVals() {\n    const s = this.state;\n    return {\n      chatOpen: s.chatOpen,\n      messages: s.messages,\n      inputText: s.inputText,\n      isTyping: s.isTyping,\n      proactiveVisible: s.proactiveVisible,\n      otpTimer: s.otpTimer,\n      showQuickActions: s.messages.length <= 1 && !s.isTyping,\n      isBalance: s.activeFlow === 'balance',\n      isTransferConfirm: s.activeFlow === 'transfer-confirm',\n      isOTPEntry: s.activeFlow === 'otp-entry',\n      isBillConfirm: s.activeFlow === 'bill-confirm',\n      isCardFreeze: s.activeFlow === 'card-freeze',\n      isSavings: s.activeFlow === 'savings',\n      isTransactions: s.activeFlow === 'transactions',\n      isDigitalProducts: s.activeFlow === 'digital-products',\n      toggleChat: () => this.toggleChat(),\n      closeChat: () => this.closeChat(),\n      resetChat: () => this.resetChat(),\n      dismissProactive: () => this.dismissProactive(),\n      openSavingsProactive: () => this.openSavingsProactive(),\n      handleBalance: () => this.handleBalance(),\n      handleTransfer: () => this.handleTransfer(),\n      handleBill: () => this.handleBill(),\n      handleCard: () => this.handleCard(),\n      handleSavings: () => this.handleSavings(),\n      handleTransactions: () => this.handleTransactions(),\n      handleDigitalProducts: () => this.handleDigitalProducts(),\n      requestOTP: () => this.requestOTP(),\n      verifyOTP: () => this.verifyOTP(),\n      confirmBill: () => this._confirm('bill'),\n      confirmCard: () => this._confirm('card'),\n      confirmSavings: () => this._confirm('savings'),\n      applyTravelCard: () => this.applyTravelCard(),\n      applyFinancing: () => this.applyFinancing(),\n      applySubAccount: () => this.applySubAccount(),\n      cancelAction: () => this.cancelAction(),\n      handleInput: (e) => this.handleInput(e),\n      handleKeyDown: (e) => this.handleKeyDown(e),\n      sendMessage: () => this.sendMessage(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
